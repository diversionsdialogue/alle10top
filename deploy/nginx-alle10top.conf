# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/alle10top.nl/before/*;

# Canonicalisatie: alles naar https://www.alle10top.nl (map i.p.v. kale
# scheme-check zodat het *.ploi.club-testdomein blijft werken; TLS voor dat
# testdomein termineert bij Ploi en komt hier als http binnen).
map "$scheme:$host" $canonical_redirect {
    default 0;
    "http:alle10top.nl" 1;
    "https:alle10top.nl" 1;
    "http:www.alle10top.nl" 1;
}

server {
    listen 80;
    listen [::]:80;
    absolute_redirect off;

    root /home/ploi/alle10top.nl/apps/web/dist;
    # *.ploi.club: het Ploi-testdomein moet hier ook matchen, anders valt het
    # in de default-vhost die de verbinding sluit (Cloudflare 520).
    server_name alle10top.nl www.alle10top.nl *.ploi.club;

    include /etc/nginx/ssl/alle10top.nl;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/dhparams.pem;

    if ($canonical_redirect) {
        return 301 https://www.alle10top.nl$request_uri;
    }

    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Ploi Configuration, do not remove!
    include /etc/nginx/ploi/alle10top.nl/server/*;

    error_page 404 /404.html;

    # Oude Yoast-sitemaps -> Astro-sitemap
    location = /sitemap_index.xml { return 301 /sitemap-index.xml; }
    location ~ ^/(post|page|category|post_tag|author|attachment)-sitemap\d*\.xml$ { return 301 /sitemap-index.xml; }

    # Attachment- en paginated-URL's van WordPress
    location ~ ^/(.+)/attachment/[^/]+/?$ { return 301 /$1/; }
    location ~ ^/author/.*$ { return 301 /over-ons/; }
    location ~ ^/wp-content/uploads/(.*)$ { return 301 /images/uploads/$1; }
    location ~ ^/blogillu/(.*)$ { return 301 /images/blogillu/$1; }
    location ~ ^/(wp-content|wp-admin|wp-includes|wp-json|wp-login\.php|xmlrpc\.php) { return 410; }
    location ~ ^/(feed|comments/feed)/?$ { return 301 /rss.xml; }
